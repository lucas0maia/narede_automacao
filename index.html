<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Na Rede · Esportes ao Vivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple:     #5C1A8A;
    --purple-mid: #7B2FBE;
    --purple-lt:  #9B59D0;
    --purple-dim: #2D0D45;
    --purple-bg:  #1A0A28;
    --bg:         #0F0818;
    --surface:    #1C0D2E;
    --surface2:   #240F3A;
    --border:     #3A1A5A;
    --border-lt:  #4A2A6A;
    --text:       #F0E8FF;
    --text-mid:   #C4A8E8;
    --muted:      #7A5A9A;
    --live:       #FF3B5C;
    --upcoming:   #00C4FF;
    --green:      #00D46A;
    --accent:     #FF3B5C;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--purple) 0%, #3D0D6B 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(92,26,138,0.4);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  /* Logo SVG Na Rede */
  .logo-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .brand-tag {
    font-size: 9px;
    font-weight: 600;
    color: rgba(255,255,255,.55);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #last-update {
    font-size: 11px;
    color: rgba(255,255,255,.45);
    background: rgba(0,0,0,.2);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.1);
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 56px);
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-top {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--purple-bg);
  }

  .sidebar-list {
    overflow-y: auto;
    flex: 1;
    padding: 10px;
  }

  /* ── Config panel ── */
  .config-panel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .config-panel summary {
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .config-panel summary::before { content: '⚙'; }
  .config-panel[open] summary { color: var(--purple-lt); margin-bottom: 10px; }
  .config-panel[open] summary::before { content: '✕'; }

  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .field label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Inter';
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--purple-lt); box-shadow: 0 0 0 3px rgba(155,89,208,.15); }
  .field input::placeholder { color: var(--muted); }

  .save-btn {
    font-size: 11px;
    font-weight: 600;
    color: var(--purple-lt);
    cursor: pointer;
    background: rgba(155,89,208,.12);
    border: 1px solid rgba(155,89,208,.3);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'Inter';
    align-self: flex-end;
    transition: background .2s;
  }
  .save-btn:hover { background: rgba(155,89,208,.22); }
  .saved-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Inter';
    font-size: 13px;
    font-weight: 600;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-mid) 100%);
    color: #fff;
    width: 100%;
    box-shadow: 0 2px 12px rgba(92,26,138,.4);
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(92,26,138,.6); }

  .btn-green {
    background: rgba(0,212,106,.1);
    color: var(--green);
    border: 1px solid rgba(0,212,106,.3);
    flex: 1;
  }
  .btn-green:hover:not(:disabled) { background: rgba(0,212,106,.18); }

  .btn-blue {
    background: rgba(0,196,255,.1);
    color: var(--upcoming);
    border: 1px solid rgba(0,196,255,.25);
    flex: 1;
  }
  .btn-blue:hover:not(:disabled) { background: rgba(0,196,255,.18); }

  /* ── Match cards ── */
  .match-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .2s;
  }
  .match-card:hover { border-color: var(--purple-lt); background: #2A1040; }
  .match-card.selected { border-color: var(--purple-lt); background: #2A1040; box-shadow: 0 0 0 1px var(--purple); }
  .match-card.live     { border-left-color: var(--live); }
  .match-card.upcoming { border-left-color: var(--upcoming); }

  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .league   { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; font-weight: 500; }

  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-live     { background: rgba(255,59,92,.15); color: var(--live); border: 1px solid rgba(255,59,92,.35); }
  .badge-upcoming { background: rgba(0,196,255,.1);  color: var(--upcoming); border: 1px solid rgba(0,196,255,.25); }

  .card-body  { display: flex; align-items: center; justify-content: space-between; }
  .card-team  { display: flex; align-items: center; gap: 6px; width: 38%; }
  .card-team.away { justify-content: flex-end; flex-direction: row-reverse; }
  .card-team img  { width: 22px; height: 22px; object-fit: contain; }
  .card-team-name { font-size: 11px; font-weight: 600; line-height: 1.2; color: var(--text-mid); }
  .card-score { font-family: 'Montserrat'; font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 2px; }

  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 12px 2px 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-label.live-label { color: var(--live); }
  .section-label.up-label   { color: var(--upcoming); }

  /* ── Main ── */
  .main { overflow-y: auto; padding: 20px 24px; background: var(--bg); }

  .empty-state {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
  }
  .empty-icon { font-size: 48px; opacity: .15; }
  .empty-big  { font-family: 'Montserrat'; font-size: 28px; font-weight: 900; color: var(--surface2); letter-spacing: 2px; text-transform: uppercase; }
  .empty-sub  { font-size: 13px; color: var(--muted); }

  /* ── Scoreboard ── */
  .scoreboard {
    background: linear-gradient(135deg, var(--surface) 0%, var(--purple-dim) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(92,26,138,.25);
    position: relative;
    overflow: hidden;
  }
  .scoreboard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--purple-lt), var(--purple));
  }

  .sb-header { text-align: center; margin-bottom: 16px; }
  .sb-liga   { font-size: 12px; color: var(--text-mid); font-weight: 500; }
  .sb-minute {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,59,92,.15); border: 1px solid rgba(255,59,92,.3);
    color: var(--live); font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; margin-left: 8px;
  }
  .sb-minute::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .sb-status { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .sb-body { display: flex; align-items: center; justify-content: space-around; }
  .sb-team { text-align: center; }
  .sb-team img { width: 56px; height: 56px; object-fit: contain; display: block; margin: 0 auto 8px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.4)); }
  .sb-team-name { font-size: 13px; font-weight: 600; max-width: 130px; line-height: 1.3; color: var(--text-mid); }
  .sb-score { font-family: 'Montserrat'; font-size: 56px; font-weight: 900; color: #fff; letter-spacing: 6px; text-shadow: 0 0 30px rgba(155,89,208,.5); }

  .sb-actions { display: flex; gap: 8px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ── Details ── */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .detail-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .section-title {
    font-family: 'Montserrat';
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text-mid);
    text-transform: uppercase;
    border-bottom: 2px solid var(--purple);
    padding-bottom: 8px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 14px;
    background: var(--purple-lt);
    border-radius: 2px;
  }

  /* ── Events ── */
  .event-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px solid var(--surface2); font-size: 12px;
  }
  .ev-min  { width: 28px; color: var(--muted); font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .ev-icon { width: 18px; text-align: center; flex-shrink: 0; }
  .ev-name { flex: 1; color: var(--text); }
  .ev-team { font-size: 10px; color: var(--muted); }

  /* ── Lineups ── */
  .team-lineup { margin-bottom: 16px; }
  .lineup-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; font-size: 12px; font-weight: 700;
    color: var(--text-mid);
  }
  .lineup-header img { width: 20px; height: 20px; object-fit: contain; }
  .formation {
    font-size: 10px; color: var(--purple-lt);
    background: rgba(155,89,208,.15);
    border: 1px solid rgba(155,89,208,.3);
    padding: 1px 7px; border-radius: 20px;
    font-weight: 600;
  }
  .players-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .subs-label {
    font-size: 9px; color: var(--muted); font-weight: 700;
    margin: 10px 0 6px; text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
  }
  .subs-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .player-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    text-align: center;
    width: 66px;
    transition: border-color .2s;
  }
  .player-card:hover { border-color: var(--purple-lt); }
  .player-card img {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; background: var(--surface);
    border: 2px solid var(--border);
  }
  .player-num  { font-size: 10px; font-weight: 700; color: var(--purple-lt); margin-top: 3px; }
  .player-name { font-size: 9px; color: var(--text-mid); line-height: 1.2; }
  .player-pos  {
    font-size: 8px; font-weight: 600;
    color: var(--muted);
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 4px;
    display: inline-block;
    margin-top: 2px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    backdrop-filter: blur(10px);
  }
  .toast.show    { opacity: 1; }
  .toast.success { background: rgba(0,212,106,.15); border: 1px solid rgba(0,212,106,.35); color: var(--green); }
  .toast.error   { background: rgba(255,59,92,.15);  border: 1px solid rgba(255,59,92,.35); color: var(--live); }
  .toast.info    { background: rgba(0,196,255,.12);  border: 1px solid rgba(0,196,255,.3);  color: var(--upcoming); }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid transparent; border-top-color: currentColor;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-lt); }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <img
      src="5dc5e844f34a98e711587cdce73e78453e935b4b.png"
      alt="Na Rede"
      style="height:34px;object-fit:contain;mix-blend-mode:screen;">
    <span class="brand-tag" style="color:rgba(255,255,255,.45);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-left:4px;align-self:flex-end;padding-bottom:2px">Esportes ao Vivo</span>
  </div>
  <div class="header-right">
    <span id="last-update"></span>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">

      <details class="config-panel" id="config-details">
        <summary>Configurações</summary>
        <div class="field">
          <label>API-Football Key</label>
          <input type="password" id="inp-api-key" placeholder="sua chave aqui">
        </div>
        <div class="field">
          <label>Google Apps Script URL</label>
          <input type="text" id="inp-script-url" placeholder="https://script.google.com/...">
        </div>
        <button class="save-btn" onclick="salvarConfig()">💾 Salvar</button>
        <span id="config-status" style="font-size:11px;color:var(--muted)"></span>
      </details>

      <button class="btn btn-primary" id="btn-buscar" onclick="buscarJogos()">
        🔍 Buscar Jogos
      </button>
    </div>

    <div class="sidebar-list" id="lista-jogos">
      <p style="color:var(--muted);font-size:12px;padding:14px 4px;line-height:1.6">
        Configure suas credenciais acima e clique em <strong style="color:var(--text-mid)">Buscar Jogos</strong>.
      </p>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="empty-state">
      <div class="empty-icon">⚽</div>
      <div class="empty-big">Selecione um jogo</div>
      <p class="empty-sub">Busque os jogos e selecione um para ver os detalhes</p>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script>
const LS_KEY  = "narede_football_config";
const ICONES  = { Goal:"⚽", Card:"🟨", subst:"🔄", Var:"📺" };
const AF_BASE = "https://v3.football.api-sports.io";

let cfg   = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
let state = { fixtures: {}, selectedId: null, preview: null, sheetLoaded: false };

document.getElementById("inp-api-key").value    = cfg.apiKey    || "";
document.getElementById("inp-script-url").value = cfg.scriptUrl || "";
if (!cfg.apiKey) document.getElementById("config-details").open = true;

function salvarConfig() {
  cfg.apiKey    = document.getElementById("inp-api-key").value.trim();
  cfg.scriptUrl = document.getElementById("inp-script-url").value.trim();
  localStorage.setItem(LS_KEY, JSON.stringify(cfg));
  document.getElementById("config-status").innerHTML = `<span class="saved-dot"></span>Salvo`;
  setTimeout(() => {
    document.getElementById("config-details").open = false;
    document.getElementById("config-status").textContent = "";
  }, 1200);
}

const $ = id => document.getElementById(id);

function toast(msg, type = "success") {
  const el = $("toast");
  el.textContent = msg;
  el.className   = `toast show ${type}`;
  setTimeout(() => el.className = "toast", 3000);
}

function setLoading(btnId, on, label) {
  const b = $(btnId);
  if (!b) return;
  b.disabled  = on;
  b.innerHTML = on ? `<span class="spinner"></span> ${label}` : label;
}

async function af(endpoint, params = {}) {
  if (!cfg.apiKey) { toast("Configure sua API Key primeiro.", "error"); return null; }
  const url = new URL(`${AF_BASE}${endpoint}`);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url, { headers: { "x-apisports-key": cfg.apiKey } });
  const d = await r.json();
  return d.errors && Object.keys(d.errors).length ? null : d;
}

async function buscarJogos() {
  if (!cfg.apiKey) {
    document.getElementById("config-details").open = true;
    toast("Configure sua API Key primeiro.", "error");
    return;
  }
  setLoading("btn-buscar", true, "Buscando...");
  try {
    const [liveR, nsR] = await Promise.all([
      af("/fixtures", { live: "all" }),
      af("/fixtures", { date: hoje(), status: "NS" }),
    ]);
    const live  = liveR?.response || [];
    const agora = Date.now();
    const em4h  = agora + 4 * 3600 * 1000;
    const upcoming = (nsR?.response || []).filter(f => {
      const t = new Date(f.fixture.date).getTime();
      return t >= agora && t <= em4h;
    });
    state.fixtures = { live, upcoming };
    renderLista();
    $("last-update").textContent = `🕐 ${new Date().toLocaleTimeString("pt-BR")}`;
  } catch(e) {
    toast("Erro ao buscar jogos: " + e.message, "error");
  } finally {
    setLoading("btn-buscar", false, "🔍 Buscar Jogos");
  }
}

async function selecionarJogo(fid) {
  state.selectedId = fid;
  renderLista();
  $("main").innerHTML = `
    <div class="empty-state">
      <span class="spinner" style="width:32px;height:32px;border-width:3px;color:var(--purple-lt)"></span>
      <p class="empty-sub" style="margin-top:14px">Carregando detalhes...</p>
    </div>`;
  try {
    const [fixR, evR, linR] = await Promise.all([
      af("/fixtures",         { id: fid }),
      af("/fixtures/events",  { fixture: fid }),
      af("/fixtures/lineups", { fixture: fid }),
    ]);
    state.preview = {
      fixture:   fixR?.response?.[0] || null,
      eventos:   evR?.response       || [],
      escalacao: linR?.response      || [],
    };
    renderPreview();
  } catch(e) {
    toast("Erro: " + e.message, "error");
  }
}

async function enviarParaSheets() {
  if (!cfg.scriptUrl) {
    toast("Configure a URL do Apps Script primeiro.", "error");
    document.getElementById("config-details").open = true;
    return false;
  }
  await fetch(cfg.scriptUrl, {
    method:  "POST",
    mode:    "no-cors",
    headers: { "Content-Type": "text/plain" },
    body:    JSON.stringify(state.preview),
  });
  return true;
}

async function carregarPlanilha() {
  setLoading("btn-carregar", true, "Escrevendo...");
  try {
    await enviarParaSheets();
    state.sheetLoaded = true;
    toast("✅ Planilha carregada com sucesso!");
    renderActions();
  } catch(e) {
    toast("Erro: " + e.message, "error");
  } finally {
    setLoading("btn-carregar", false, "📊 Carregar Planilha");
  }
}

async function atualizarPlanilha() {
  setLoading("btn-atualizar", true, "Atualizando...");
  try {
    const fid = state.selectedId;
    const [fixR, evR, linR] = await Promise.all([
      af("/fixtures",         { id: fid }),
      af("/fixtures/events",  { fixture: fid }),
      af("/fixtures/lineups", { fixture: fid }),
    ]);
    state.preview = {
      fixture:   fixR?.response?.[0] || null,
      eventos:   evR?.response       || [],
      escalacao: linR?.response      || [],
    };
    await enviarParaSheets();
    toast("✅ Planilha atualizada!");
    renderPreview();
  } catch(e) {
    toast("Erro: " + e.message, "error");
  } finally {
    setLoading("btn-atualizar", false, "🔄 Atualizar");
  }
}

function renderLista() {
  const { live = [], upcoming = [] } = state.fixtures;
  if (!live.length && !upcoming.length) {
    $("lista-jogos").innerHTML = `<p style="color:var(--muted);font-size:12px;padding:12px 4px">Nenhum jogo encontrado.</p>`;
    return;
  }
  let html = "";
  if (live.length) {
    html += `<div class="section-label live-label">🔴 Ao Vivo · ${live.length} jogos</div>`;
    for (const f of live) html += cardHTML(f);
  }
  if (upcoming.length) {
    html += `<div class="section-label up-label">🕐 Próximas 4h · ${upcoming.length} jogos</div>`;
    for (const f of upcoming) html += cardHTML(f);
  }
  $("lista-jogos").innerHTML = html;
}

function cardHTML(f) {
  const fid    = f.fixture.id;
  const status = f.fixture.status.short;
  const isLive = ["1H","2H","HT","ET","P","BT","LIVE"].includes(status);
  const min    = f.fixture.status.elapsed;
  const gh     = f.goals.home !== null ? f.goals.home : "—";
  const ga     = f.goals.away !== null ? f.goals.away : "—";
  const horario = new Date(f.fixture.date).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const badge  = isLive
    ? `<span class="badge badge-live">● ${min}'</span>`
    : `<span class="badge badge-upcoming">🕐 ${horario}</span>`;
  const sel = state.selectedId === fid ? " selected" : "";
  const cls = isLive ? "live" : "upcoming";

  return `
  <div class="match-card ${cls}${sel}" onclick="selecionarJogo(${fid})">
    <div class="card-top">
      <span class="league">${f.league.name}</span>
      ${badge}
    </div>
    <div class="card-body">
      <div class="card-team home">
        <img src="${f.teams.home.logo}" onerror="this.style.display='none'">
        <span class="card-team-name">${f.teams.home.name}</span>
      </div>
      <span class="card-score">${gh} : ${ga}</span>
      <div class="card-team away">
        <img src="${f.teams.away.logo}" onerror="this.style.display='none'">
        <span class="card-team-name">${f.teams.away.name}</span>
      </div>
    </div>
  </div>`;
}

function renderPreview() {
  const { fixture: f, eventos, escalacao } = state.preview;
  if (!f) {
    $("main").innerHTML = `<div class="empty-state"><p class="empty-sub">Dados indisponíveis.</p></div>`;
    return;
  }
  const gh  = f.goals.home !== null ? f.goals.home : 0;
  const ga  = f.goals.away !== null ? f.goals.away : 0;
  const min = f.fixture.status.elapsed;

  $("main").innerHTML = `
    <div class="scoreboard">
      <div class="sb-header">
        <img src="${f.league.logo}" style="height:16px;vertical-align:middle;margin-right:6px;opacity:.8" onerror="this.style.display='none'">
        <span class="sb-liga">${f.league.name} · ${f.league.country}</span>
        ${min ? `<span class="sb-minute">${min}'</span>` : ""}
        <div class="sb-status">${f.fixture.status.long}</div>
      </div>
      <div class="sb-body">
        <div class="sb-team">
          <img src="${f.teams.home.logo}" onerror="this.style.display='none'">
          <div class="sb-team-name">${f.teams.home.name}</div>
        </div>
        <div class="sb-score">${gh}&thinsp;<span style="color:var(--border-lt)">:</span>&thinsp;${ga}</div>
        <div class="sb-team">
          <img src="${f.teams.away.logo}" onerror="this.style.display='none'">
          <div class="sb-team-name">${f.teams.away.name}</div>
        </div>
      </div>
      <div class="sb-actions" id="actions-container">${actionsHTML()}</div>
    </div>

    <div class="detail-grid">
      <div class="detail-box">
        <div class="section-title">Eventos</div>
        ${eventosHTML(eventos, f.teams.home.name)}
      </div>
      <div class="detail-box">
        <div class="section-title">Escalação</div>
        ${escalacaoHTML(escalacao)}
      </div>
    </div>`;
}

function renderActions() {
  const el = $("actions-container");
  if (el) el.innerHTML = actionsHTML();
}

function actionsHTML() {
  return `
    <button class="btn btn-green" id="btn-carregar" onclick="carregarPlanilha()">
      📊 Carregar Planilha
    </button>
    <button class="btn btn-blue" id="btn-atualizar"
      onclick="atualizarPlanilha()" ${!state.sheetLoaded ? "disabled" : ""}>
      🔄 Atualizar
    </button>`;
}

function eventosHTML(eventos, home) {
  if (!eventos.length) return `<p style="color:var(--muted);font-size:12px;padding:8px 0">Nenhum evento registrado.</p>`;
  return eventos.map(ev => {
    const icone  = ev.detail === "Red Card" ? "🟥" : (ICONES[ev.type] || "•");
    const assist = ev.assist?.name || "";
    const sub    = assist && ev.type === "subst" ? ` ↩ ${assist}` : "";
    const lado   = ev.team.name === home ? "⬅️" : "➡️";
    return `
    <div class="event-row">
      <span class="ev-min">${ev.time.elapsed}'</span>
      <span class="ev-icon">${icone}</span>
      <span class="ev-name">${ev.player.name}${sub}</span>
      <span class="ev-team">${lado} ${ev.team.name.split(" ")[0]}</span>
    </div>`;
  }).join("");
}

function escalacaoHTML(escalacao) {
  if (!escalacao.length) return `<p style="color:var(--muted);font-size:12px;padding:8px 0">Escalação ainda não disponível.</p>`;
  return escalacao.map(team => {
    const titulares = team.startXI.map(p => playerCardHTML(p.player)).join("");
    const reservas  = team.substitutes.map(p => playerCardHTML(p.player, true)).join("");
    return `
    <div class="team-lineup">
      <div class="lineup-header">
        <img src="${team.team.logo}" onerror="this.style.display='none'">
        <span>${team.team.name}</span>
        <span class="formation">${team.formation}</span>
      </div>
      <div class="players-grid">${titulares}</div>
      <div class="subs-label">Reservas</div>
      <div class="players-grid">${reservas}</div>
    </div>`;
  }).join("");
}

function playerCardHTML(pl, sub = false) {
  const foto = `https://media.api-sports.io/football/players/${pl.id}.png`;
  const nome = pl.name.split(" ").pop();
  return `
  <div class="player-card" style="${sub ? 'opacity:.5' : ''}">
    <img src="${foto}" onerror="this.src='https://placehold.co/40x40/1C0D2E/7A5A9A?text=${pl.number}'">
    <div class="player-num">#${pl.number}</div>
    <div class="player-name">${nome}</div>
    <div class="player-pos">${pl.pos || ''}</div>
  </div>`;
}

function hoje() {
  return new Date().toISOString().split("T")[0];
}
</script>
</body>
</html>
