<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Football Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0d;
    --surface:  #161b22;
    --border:   #21262d;
    --text:     #e0e0e0;
    --muted:    #555;
    --accent:   #e8ff5a;
    --live:     #ff4444;
    --upcoming: #4488ff;
  }

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  /* ── Header ── */
  header {
    background: #111318; border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 3px; color: var(--accent); }
  #last-update { font-size: 12px; color: var(--muted); }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 52px); }

  /* ── Sidebar ── */
  .sidebar { background: #111318; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .sidebar-list { overflow-y: auto; flex: 1; padding: 10px; }

  /* ── Config panel ── */
  .config-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }
  .config-panel summary {
    cursor: pointer; font-size: 12px; color: var(--muted); font-weight: 600;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .config-panel[open] summary { color: var(--accent); margin-bottom: 6px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); }
  .field input {
    background: #0d0d0d; border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; color: var(--text); font-size: 12px; font-family: 'DM Sans';
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: #333; }
  .save-btn { font-size: 11px; color: var(--accent); cursor: pointer; background: none; border: none; font-family: 'DM Sans'; align-self: flex-end; }
  .saved-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; display: inline-block; margin-right: 4px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'DM Sans'; font-size: 13px; font-weight: 600;
    transition: opacity .15s, transform .1s; white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--accent); color: #111; width: 100%; }
  .btn-green   { background: #1a3a1a; color: #4caf50; border: 1px solid #2a5a2a; flex: 1; }
  .btn-blue    { background: #1a2a3a; color: var(--upcoming); border: 1px solid #1a3a5a; flex: 1; }

  /* ── Match cards ── */
  .match-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
    cursor: pointer; transition: border-color .2s;
  }
  .match-card:hover { border-color: var(--accent); }
  .match-card.selected { border-color: var(--accent); background: #1c2210; }
  .match-card.live     { border-left-color: var(--live); }
  .match-card.upcoming { border-left-color: var(--upcoming); }

  .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .league   { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
  .badge    { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .badge-live     { background: var(--live); color: #fff; }
  .badge-upcoming { background: #1a2a4a; color: var(--upcoming); }

  .card-body  { display: flex; align-items: center; justify-content: space-between; }
  .card-team  { display: flex; align-items: center; gap: 6px; width: 38%; }
  .card-team.away { justify-content: flex-end; flex-direction: row-reverse; }
  .card-team img  { width: 24px; height: 24px; object-fit: contain; }
  .card-team-name { font-size: 11px; font-weight: 600; line-height: 1.2; }
  .card-score { font-family: 'Bebas Neue'; font-size: 22px; color: var(--accent); letter-spacing: 3px; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 10px 2px 5px; }
  .section-label.live-label { color: var(--live); }
  .section-label.up-label   { color: var(--upcoming); }

  /* ── Main area ── */
  .main { overflow-y: auto; padding: 20px 28px; }

  .empty-state {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .empty-big { font-family: 'Bebas Neue'; font-size: 48px; color: #1e1e1e; letter-spacing: 4px; }
  .empty-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* ── Scoreboard ── */
  .scoreboard {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .sb-header { text-align: center; margin-bottom: 14px; }
  .sb-liga   { font-size: 12px; color: var(--muted); }
  .sb-minute { color: var(--live); font-size: 12px; font-weight: 600; margin-left: 8px; }
  .sb-status { font-size: 11px; color: #444; margin-top: 2px; }

  .sb-body { display: flex; align-items: center; justify-content: space-around; }
  .sb-team { text-align: center; }
  .sb-team img { width: 52px; height: 52px; object-fit: contain; display: block; margin: 0 auto 8px; }
  .sb-team-name { font-size: 13px; font-weight: 600; max-width: 120px; line-height: 1.3; }
  .sb-score { font-family: 'Bebas Neue'; font-size: 54px; color: var(--accent); letter-spacing: 8px; }

  .sb-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* ── Details grid ── */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .section-title {
    font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px; color: var(--accent);
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px;
  }

  /* ── Events ── */
  .event-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid #1a1a1a; font-size: 12px;
  }
  .ev-min  { width: 30px; color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .ev-icon { width: 18px; text-align: center; flex-shrink: 0; }
  .ev-name { flex: 1; }
  .ev-team { font-size: 10px; color: var(--muted); }

  /* ── Lineups ── */
  .team-lineup { margin-bottom: 16px; }
  .lineup-header { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; font-size: 12px; font-weight: 600; }
  .lineup-header img { width: 20px; height: 20px; object-fit: contain; }
  .formation { color: var(--muted); font-size: 11px; }
  .players-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .subs-label { font-size: 10px; color: var(--muted); font-weight: 600; margin: 8px 0 5px; text-transform: uppercase; letter-spacing: .5px; }

  .player-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px; text-align: center; width: 66px;
  }
  .player-card img {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; background: #1e1e1e; border: 1px solid var(--border);
  }
  .player-num  { font-size: 10px; font-weight: 700; color: var(--accent); margin-top: 3px; }
  .player-name { font-size: 9px; color: var(--text); line-height: 1.2; }
  .player-pos  { font-size: 9px; color: var(--muted); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
  }
  .toast.show      { opacity: 1; }
  .toast.success   { background: #1a3a1a; border: 1px solid #2a5a2a; color: #4caf50; }
  .toast.error     { background: #3a1a1a; border: 1px solid #5a2a2a; color: #ff6666; }
  .toast.info      { background: #1a2a3a; border: 1px solid #2a4a6a; color: var(--upcoming); }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid transparent; border-top-color: currentColor;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⚽ Football Live</h1>
  <span id="last-update"></span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">

      <!-- Config -->
      <details class="config-panel" id="config-details">
        <summary>⚙️ Configurações</summary>
        <div class="field">
          <label>API-Football Key</label>
          <input type="password" id="inp-api-key" placeholder="sua chave aqui">
        </div>
        <div class="field">
          <label>Google Apps Script URL</label>
          <input type="text" id="inp-script-url" placeholder="https://script.google.com/...">
        </div>
        <button class="save-btn" onclick="salvarConfig()">💾 Salvar configurações</button>
        <span id="config-status" style="font-size:11px;color:var(--muted)"></span>
      </details>

      <button class="btn btn-primary" id="btn-buscar" onclick="buscarJogos()">
        🔍 Buscar Jogos
      </button>
    </div>

    <div class="sidebar-list" id="lista-jogos">
      <p style="color:var(--muted);font-size:12px;padding:12px 4px">
        Configure suas credenciais acima e clique em <strong style="color:var(--text)">Buscar Jogos</strong>.
      </p>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="empty-state">
      <div class="empty-big">SELECT MATCH</div>
      <p class="empty-sub">Busque os jogos e selecione um para ver os detalhes</p>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Config persistida em localStorage ─────────────────────────────────────
const LS_KEY  = "football_live_config";
const ICONES  = { Goal:"⚽", Card:"🟨", subst:"🔄", Var:"📺" };
const AF_BASE = "https://v3.football.api-sports.io";

let cfg = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
let state = { fixtures: {}, selectedId: null, preview: null, sheetLoaded: false };

// Preenche campos ao abrir
document.getElementById("inp-api-key").value    = cfg.apiKey    || "";
document.getElementById("inp-script-url").value = cfg.scriptUrl || "";
if (!cfg.apiKey) document.getElementById("config-details").open = true;

function salvarConfig() {
  cfg.apiKey    = document.getElementById("inp-api-key").value.trim();
  cfg.scriptUrl = document.getElementById("inp-script-url").value.trim();
  localStorage.setItem(LS_KEY, JSON.stringify(cfg));
  document.getElementById("config-status").innerHTML =
    `<span class="saved-dot"></span>Salvo`;
  setTimeout(() => {
    document.getElementById("config-details").open = false;
    document.getElementById("config-status").textContent = "";
  }, 1200);
}

// ── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function toast(msg, type = "success") {
  const el = $("toast");
  el.textContent = msg;
  el.className   = `toast show ${type}`;
  setTimeout(() => el.className = "toast", 3000);
}

function setLoading(btnId, on, label) {
  const b = $(btnId);
  if (!b) return;
  b.disabled  = on;
  b.innerHTML = on ? `<span class="spinner"></span> ${label}` : label;
}

// ── API-Football ──────────────────────────────────────────────────────────
async function af(endpoint, params = {}) {
  if (!cfg.apiKey) { toast("Configure sua API Key primeiro.", "error"); return null; }
  const url = new URL(`${AF_BASE}${endpoint}`);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url, { headers: { "x-apisports-key": cfg.apiKey } });
  const d = await r.json();
  return d.errors && Object.keys(d.errors).length ? null : d;
}

async function buscarJogos() {
  if (!cfg.apiKey) {
    document.getElementById("config-details").open = true;
    toast("Configure sua API Key primeiro.", "error");
    return;
  }
  setLoading("btn-buscar", true, "Buscando...");
  try {
    const [liveR, nsR] = await Promise.all([
      af("/fixtures", { live: "all" }),
      af("/fixtures", { date: hoje(), status: "NS" }),
    ]);

    const live = liveR?.response || [];
    const agora = Date.now();
    const em4h  = agora + 4 * 3600 * 1000;
    const upcoming = (nsR?.response || []).filter(f => {
      const t = new Date(f.fixture.date).getTime();
      return t >= agora && t <= em4h;
    });

    state.fixtures = { live, upcoming };
    renderLista();
    $("last-update").textContent = `🕐 ${new Date().toLocaleTimeString("pt-BR")}`;
  } catch(e) {
    toast("Erro ao buscar jogos: " + e.message, "error");
  } finally {
    setLoading("btn-buscar", false, "🔍 Buscar Jogos");
  }
}

async function selecionarJogo(fid) {
  state.selectedId = fid;
  renderLista();
  $("main").innerHTML = `
    <div class="empty-state">
      <span class="spinner" style="width:32px;height:32px;border-width:3px;color:var(--accent)"></span>
      <p class="empty-sub" style="margin-top:14px">Carregando detalhes...</p>
    </div>`;
  try {
    const [fixR, evR, linR] = await Promise.all([
      af("/fixtures",         { id: fid }),
      af("/fixtures/events",  { fixture: fid }),
      af("/fixtures/lineups", { fixture: fid }),
    ]);
    state.preview = {
      fixture:   fixR?.response?.[0] || null,
      eventos:   evR?.response       || [],
      escalacao: linR?.response      || [],
    };
    renderPreview();
  } catch(e) {
    toast("Erro: " + e.message, "error");
  }
}

// ── Google Sheets via Apps Script ─────────────────────────────────────────
async function enviarParaSheets() {
  if (!cfg.scriptUrl) {
    toast("Configure a URL do Apps Script primeiro.", "error");
    document.getElementById("config-details").open = true;
    return false;
  }
  const r = await fetch(cfg.scriptUrl, {
    method:  "POST",
    headers: { "Content-Type": "text/plain" }, // Apps Script precisa de text/plain para evitar preflight CORS
    body:    JSON.stringify(state.preview),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || "Erro desconhecido");
  return true;
}

async function carregarPlanilha() {
  setLoading("btn-carregar", true, "Escrevendo...");
  try {
    await enviarParaSheets();
    state.sheetLoaded = true;
    toast("✅ Planilha carregada com sucesso!");
    renderActions();
  } catch(e) {
    toast("Erro: " + e.message, "error");
  } finally {
    setLoading("btn-carregar", false, "📊 Carregar Planilha");
  }
}

async function atualizarPlanilha() {
  setLoading("btn-atualizar", true, "Atualizando...");
  try {
    // Rebusca dados frescos
    const fid = state.selectedId;
    const [fixR, evR, linR] = await Promise.all([
      af("/fixtures",         { id: fid }),
      af("/fixtures/events",  { fixture: fid }),
      af("/fixtures/lineups", { fixture: fid }),
    ]);
    state.preview = {
      fixture:   fixR?.response?.[0] || null,
      eventos:   evR?.response       || [],
      escalacao: linR?.response      || [],
    };
    await enviarParaSheets();
    toast("✅ Planilha atualizada!");
    renderPreview();
  } catch(e) {
    toast("Erro: " + e.message, "error");
  } finally {
    setLoading("btn-atualizar", false, "🔄 Atualizar");
  }
}

// ── Renders ───────────────────────────────────────────────────────────────
function renderLista() {
  const { live = [], upcoming = [] } = state.fixtures;
  if (!live.length && !upcoming.length) {
    $("lista-jogos").innerHTML = `<p style="color:var(--muted);font-size:12px;padding:12px 4px">Nenhum jogo encontrado.</p>`;
    return;
  }
  let html = "";
  if (live.length) {
    html += `<div class="section-label live-label">🔴 Ao Vivo · ${live.length} jogos</div>`;
    for (const f of live) html += cardHTML(f);
  }
  if (upcoming.length) {
    html += `<div class="section-label up-label">🕐 Próximas 4h · ${upcoming.length} jogos</div>`;
    for (const f of upcoming) html += cardHTML(f);
  }
  $("lista-jogos").innerHTML = html;
}

function cardHTML(f) {
  const fid    = f.fixture.id;
  const status = f.fixture.status.short;
  const isLive = ["1H","2H","HT","ET","P","BT","LIVE"].includes(status);
  const min    = f.fixture.status.elapsed;
  const gh     = f.goals.home !== null ? f.goals.home : "—";
  const ga     = f.goals.away !== null ? f.goals.away : "—";
  const horario = new Date(f.fixture.date).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const badge  = isLive
    ? `<span class="badge badge-live">🔴 ${min}'</span>`
    : `<span class="badge badge-upcoming">🕐 ${horario}</span>`;
  const sel = state.selectedId === fid ? " selected" : "";
  const cls = isLive ? "live" : "upcoming";

  return `
  <div class="match-card ${cls}${sel}" onclick="selecionarJogo(${fid})">
    <div class="card-top">
      <span class="league">${f.league.name}</span>
      ${badge}
    </div>
    <div class="card-body">
      <div class="card-team home">
        <img src="${f.teams.home.logo}" onerror="this.style.display='none'">
        <span class="card-team-name">${f.teams.home.name}</span>
      </div>
      <span class="card-score">${gh}:${ga}</span>
      <div class="card-team away">
        <img src="${f.teams.away.logo}" onerror="this.style.display='none'">
        <span class="card-team-name">${f.teams.away.name}</span>
      </div>
    </div>
  </div>`;
}

function renderPreview() {
  const { fixture: f, eventos, escalacao } = state.preview;
  if (!f) { $("main").innerHTML = `<div class="empty-state"><p class="empty-sub">Dados indisponíveis.</p></div>`; return; }

  const gh  = f.goals.home !== null ? f.goals.home : 0;
  const ga  = f.goals.away !== null ? f.goals.away : 0;
  const min = f.fixture.status.elapsed;

  $("main").innerHTML = `
    <div class="scoreboard">
      <div class="sb-header">
        <img src="${f.league.logo}" style="height:16px;vertical-align:middle;margin-right:6px" onerror="this.style.display='none'">
        <span class="sb-liga">${f.league.name}</span>
        ${min ? `<span class="sb-minute">🔴 ${min}'</span>` : ""}
        <div class="sb-status">${f.fixture.status.long}</div>
      </div>
      <div class="sb-body">
        <div class="sb-team">
          <img src="${f.teams.home.logo}" onerror="this.style.display='none'">
          <div class="sb-team-name">${f.teams.home.name}</div>
        </div>
        <div class="sb-score">${gh}&nbsp;<span style="color:#333">:</span>&nbsp;${ga}</div>
        <div class="sb-team">
          <img src="${f.teams.away.logo}" onerror="this.style.display='none'">
          <div class="sb-team-name">${f.teams.away.name}</div>
        </div>
      </div>
      <div class="sb-actions" id="actions-container">${actionsHTML()}</div>
    </div>

    <div class="detail-grid">
      <div>
        <div class="section-title">EVENTOS</div>
        ${eventosHTML(eventos, f.teams.home.name)}
      </div>
      <div>
        <div class="section-title">ESCALAÇÃO</div>
        ${escalacaoHTML(escalacao)}
      </div>
    </div>`;
}

function renderActions() {
  const el = $("actions-container");
  if (el) el.innerHTML = actionsHTML();
}

function actionsHTML() {
  return `
    <button class="btn btn-green" id="btn-carregar" onclick="carregarPlanilha()">
      📊 Carregar Planilha
    </button>
    <button class="btn btn-blue" id="btn-atualizar"
      onclick="atualizarPlanilha()" ${!state.sheetLoaded ? "disabled" : ""}>
      🔄 Atualizar
    </button>`;
}

function eventosHTML(eventos, home) {
  if (!eventos.length) return `<p style="color:var(--muted);font-size:12px">Nenhum evento registrado.</p>`;
  return eventos.map(ev => {
    const icone  = ev.detail === "Red Card" ? "🟥" : (ICONES[ev.type] || "•");
    const assist = ev.assist?.name || "";
    const sub    = assist && ev.type === "subst" ? ` ↩ ${assist}` : "";
    const lado   = ev.team.name === home ? "⬅️" : "➡️";
    return `
    <div class="event-row">
      <span class="ev-min">${ev.time.elapsed}'</span>
      <span class="ev-icon">${icone}</span>
      <span class="ev-name">${ev.player.name}${sub}</span>
      <span class="ev-team">${lado} ${ev.team.name.split(" ")[0]}</span>
    </div>`;
  }).join("");
}

function escalacaoHTML(escalacao) {
  if (!escalacao.length) return `<p style="color:var(--muted);font-size:12px">Escalação ainda não disponível.</p>`;
  return escalacao.map(team => {
    const titulares = team.startXI.map(p => playerCardHTML(p.player)).join("");
    const reservas  = team.substitutes.map(p => playerCardHTML(p.player, true)).join("");
    return `
    <div class="team-lineup">
      <div class="lineup-header">
        <img src="${team.team.logo}" onerror="this.style.display='none'">
        <span>${team.team.name}</span>
        <span class="formation">${team.formation}</span>
      </div>
      <div class="players-grid">${titulares}</div>
      <div class="subs-label">🔄 Reservas</div>
      <div class="players-grid">${reservas}</div>
    </div>`;
  }).join("");
}

function playerCardHTML(pl, sub = false) {
  const foto = `https://media.api-sports.io/football/players/${pl.id}.png`;
  const nome = pl.name.split(" ").pop();
  return `
  <div class="player-card" style="${sub ? 'opacity:.55' : ''}">
    <img src="${foto}" onerror="this.src='https://placehold.co/40x40/1e1e1e/555?text=${pl.number}'">
    <div class="player-num">#${pl.number}</div>
    <div class="player-name">${nome}</div>
    <div class="player-pos">${pl.pos || ''}</div>
  </div>`;
}

function hoje() {
  return new Date().toISOString().split("T")[0];
}
</script>
</body>
</html>
