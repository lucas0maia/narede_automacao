<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Na Rede · Painel Futebol</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#5C1A8A;
  --purple2:#7B2FBE;
  --purple3:#9B59D0;
  --bg:#0F0818;
  --surface:#1C0D2E;
  --surface2:#240F3A;
  --border:#3A1A5A;
  --text:#F0E8FF;
  --muted:#9b83b6;
  --live:#FF3B5C;
  --upcoming:#00C4FF;
  --green:#00D46A;
}
body{background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;height:100vh;overflow:hidden}
header{height:56px;background:linear-gradient(135deg,var(--purple),#3D0D6B);display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--border)}
.brand{font-weight:900;letter-spacing:.5px}
.brand small{font-size:10px;color:rgba(255,255,255,.55);margin-left:8px;text-transform:uppercase;letter-spacing:2px}
.header-actions{display:flex;gap:10px;align-items:center}
#last-update{font-size:11px;color:rgba(255,255,255,.55)}
.btn-live{font-size:12px;text-decoration:none;color:#fff;background:rgba(255,59,92,.2);border:1px solid rgba(255,59,92,.45);padding:6px 12px;border-radius:8px;font-weight:700}

.layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 56px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px;display:flex;flex-direction:column;gap:10px;background:#1A0A28;border-bottom:1px solid var(--border)}
.sidebar-list{overflow:auto;padding:10px}

.box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px}
.box-title{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800;letter-spacing:1px;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.field label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
.field input,.field select{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px;font-size:12px;outline:none}
.field input:focus,.field select:focus{border-color:var(--purple3)}

.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.checkbox-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
.checkbox-row input{accent-color:var(--purple3)}

.btn{border:none;border-radius:9px;padding:10px 13px;font-weight:800;font-family:Inter;cursor:pointer;color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple2));width:100%}
.btn-green{background:rgba(0,212,106,.15);border:1px solid rgba(0,212,106,.35);color:var(--green);flex:1}
.btn-blue{background:rgba(0,196,255,.12);border:1px solid rgba(0,196,255,.35);color:var(--upcoming);flex:1}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px}

.comp-list{max-height:190px;overflow:auto;padding-right:3px}
.comp-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#cdb8ec;margin-bottom:5px;cursor:pointer}
.comp-item input{accent-color:var(--purple3)}

.match-card{background:var(--surface2);border:1px solid var(--border);border-left:4px solid transparent;border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer}
.match-card:hover,.match-card.selected{border-color:var(--purple3);background:#2A1040}
.match-card.live{border-left-color:var(--live)}
.match-card.upcoming{border-left-color:var(--upcoming)}
.card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}
.league{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;border-radius:99px;padding:2px 8px;font-weight:900}
.badge-live{color:var(--live);border:1px solid rgba(255,59,92,.45);background:rgba(255,59,92,.13)}
.badge-up{color:var(--upcoming);border:1px solid rgba(0,196,255,.35);background:rgba(0,196,255,.11)}
.card-body{display:flex;align-items:center;justify-content:space-between;gap:8px}
.team-mini{display:flex;align-items:center;gap:6px;width:38%}
.team-mini.away{flex-direction:row-reverse;text-align:right}
.team-mini img{width:22px;height:22px;object-fit:contain}
.team-mini span{font-size:11px;font-weight:700;line-height:1.1}
.score-mini{font-weight:900;font-size:20px}

.main{overflow:auto;padding:22px}
.empty{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--muted);gap:10px}
.empty strong{font-size:26px;color:#322044}

.scoreboard{background:linear-gradient(135deg,var(--surface),#2D0D45);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px}
.sb-top{text-align:center;margin-bottom:14px}
.sb-top img{height:18px;vertical-align:middle;margin-right:6px}
.sb-league{font-size:13px;color:#cdb8ec}
.sb-status{font-size:11px;color:var(--muted);margin-top:4px}
.sb-body{display:flex;align-items:center;justify-content:space-around}
.sb-team{text-align:center;width:32%}
.sb-team img{width:58px;height:58px;object-fit:contain;margin-bottom:6px}
.sb-team div{font-size:14px;font-weight:800}
.sb-score{font-size:58px;font-weight:900;letter-spacing:4px}
.sb-actions{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}

.tabs{display:flex;gap:3px;background:var(--surface);padding:4px;border-radius:10px;margin-bottom:14px}
.tab{flex:1;background:transparent;color:var(--muted);border:none;border-radius:7px;padding:9px;font-weight:800;cursor:pointer}
.tab.active{background:var(--purple);color:#fff}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px}
.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#cdb8ec;margin-bottom:10px;border-bottom:2px solid var(--purple);padding-bottom:8px}

.event{display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.05);padding:7px 0;font-size:12px}
.event-min{width:34px;color:var(--purple3);font-weight:900}
.event-name{flex:1}
.event-team{font-size:10px;color:var(--muted)}

.lineup-team{margin-bottom:16px}
.lineup-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;font-weight:900}
.lineup-head img{width:20px;height:20px}
.players{display:flex;flex-wrap:wrap;gap:6px}
.player{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px;width:72px;text-align:center}
.player img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.player-num{font-size:10px;color:var(--purple3);font-weight:900}
.player-name{font-size:9px}
.player-pos{font-size:8px;color:var(--muted)}
.player-mini{font-size:7px;color:var(--green);line-height:1.2;margin-top:3px}
.sub-label{font-size:9px;color:var(--muted);font-weight:900;margin:10px 0 5px;text-transform:uppercase}

.stat-row{margin-bottom:11px}
.stat-label{text-align:center;font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-wrap{display:flex;align-items:center;gap:7px}
.stat-val{width:44px;font-size:13px;font-weight:900}
.stat-val.right{text-align:right}
.track{height:7px;flex:1;background:var(--surface2);border-radius:4px;overflow:hidden;display:flex}
.bar-home{height:100%;background:var(--purple3)}
.bar-away{height:100%;background:var(--upcoming)}

.table{width:100%;border-collapse:collapse;font-size:12px}
.table th,.table td{padding:7px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center}
.table th{text-transform:uppercase;font-size:10px;color:var(--muted)}
.table td:nth-child(2),.table th:nth-child(2){text-align:left}
.table tr.highlight td{background:rgba(155,89,208,.18);font-weight:900}

.toast{position:fixed;right:20px;bottom:20px;padding:11px 16px;border-radius:9px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.25s}
.toast.show{opacity:1}
.toast.success{background:rgba(0,212,106,.15);border:1px solid rgba(0,212,106,.4);color:var(--green)}
.toast.error{background:rgba(255,59,92,.15);border:1px solid rgba(255,59,92,.4);color:var(--live)}
.toast.info{background:rgba(0,196,255,.12);border:1px solid rgba(0,196,255,.35);color:var(--upcoming)}

.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>
<header>
  <div class="brand">Na Rede <small>Esportes ao Vivo</small></div>
  <div class="header-actions">
    <span id="last-update"></span>
    <a class="btn-live" href="live.html" target="_blank">📺 Transmissão</a>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="box">
        <div class="box-title">⚙ Configurações</div>
        <div class="field">
          <label>API-Football Key</label>
          <input id="api-key" type="password" placeholder="sua chave da API">
        </div>
        <div class="field">
          <label>Google Apps Script URL</label>
          <input id="script-url" type="text" placeholder="https://script.google.com/.../exec">
        </div>
        <button class="btn btn-ghost" style="width:100%" onclick="salvarConfig()">💾 Salvar configurações</button>
      </div>

      <div class="box">
        <div class="box-title">🏆 Competições</div>
        <div class="comp-list" id="comp-list"></div>
      </div>

      <div class="box">
        <div class="row" style="margin-bottom:8px">
          <div class="box-title" style="margin:0">🔄 Auto-refresh</div>
          <span id="countdown" style="font-size:12px;color:var(--purple3);font-weight:900"></span>
        </div>
        <div class="field">
          <select id="refresh-interval">
            <option value="120">2 minutos</option>
            <option value="300" selected>5 minutos</option>
            <option value="600">10 minutos</option>
            <option value="900">15 minutos</option>
          </select>
        </div>
        <label class="checkbox-row">
          <input id="auto-refresh" type="checkbox" onchange="toggleAuto(this.checked)">
          Ativar auto-refresh
        </label>
        <label class="checkbox-row" style="margin-top:6px">
          <input id="auto-sync" type="checkbox" checked>
          Sincronizar planilha
        </label>
      </div>

      <button class="btn btn-primary" id="btn-search" onclick="buscarJogos()">🔍 Buscar jogos</button>
    </div>

    <div class="sidebar-list" id="matches">
      <p style="font-size:12px;color:var(--muted);line-height:1.5">
        Configure a API Key e busque os jogos.
      </p>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty">
      <div style="font-size:44px">⚽</div>
      <strong>Selecione um jogo</strong>
      <span>Depois carregue a planilha para o vMix.</span>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const AF_BASE = "https://v3.football.api-sports.io";
const LS_CFG = "narede_cfg_v7";
const LS_COMP = "narede_comp_v7";

const MAIN_COMPS = [
  {id:71,nome:"Brasileirão Série A"},
  {id:72,nome:"Brasileirão Série B"},
  {id:73,nome:"Copa do Brasil"},
  {id:13,nome:"Libertadores"},
  {id:11,nome:"Sul-Americana"},
  {id:2,nome:"Champions League"},
  {id:3,nome:"Europa League"},
  {id:39,nome:"Premier League"},
  {id:140,nome:"La Liga"},
  {id:135,nome:"Serie A Itália"},
  {id:78,nome:"Bundesliga"},
  {id:61,nome:"Ligue 1"},
  {id:1,nome:"Copa do Mundo"},
  {id:9,nome:"Copa América"},
  {id:6,nome:"Eurocopa"},
  {id:31,nome:"Eliminatórias Sul-Americanas"}
];

const ICONES = {
  Goal: "⚽",
  Card: "🟨",
  subst: "🔄",
  Var: "📺"
};

let cfg = JSON.parse(localStorage.getItem(LS_CFG) || "{}");
let comp = JSON.parse(localStorage.getItem(LS_COMP) || "null");

if (!comp) {
  comp = {
    enabled: MAIN_COMPS.map(c => c.id),
    showOthers: false
  };
  localStorage.setItem(LS_COMP, JSON.stringify(comp));
}

let S = {
  fixtures: { live: [], upcoming: [] },
  selectedId: null,
  preview: null,
  statsData: [],
  standData: null,
  playersData: [],
  sheetLoaded: false,
  activeTab: "geral"
};

let timer = null;
let countdown = 0;

let bc = null;
if (typeof BroadcastChannel !== "undefined") {
  bc = new BroadcastChannel("narede_live");
  bc.onmessage = e => {
    if (e.data && e.data.type === "request_state") {
      broadcastState();
    }
  };
}

const $ = id => document.getElementById(id);

init();

function init() {
  $("api-key").value = cfg.apiKey || "";
  $("script-url").value = cfg.scriptUrl || "";
  renderCompList();
}

function toast(msg,type="success") {
  const el = $("toast");
  el.textContent = msg;
  el.className = "toast show " + type;
  setTimeout(() => el.className = "toast", 3000);
}

function setLoading(id,on,label) {
  const el = $(id);
  if (!el) return;
  el.disabled = on;
  el.innerHTML = on ? '<span class="spinner"></span> ' + label : label;
}

function salvarConfig() {
  cfg.apiKey = $("api-key").value.trim();
  cfg.scriptUrl = $("script-url").value.trim();
  localStorage.setItem(LS_CFG, JSON.stringify(cfg));
  toast("Configurações salvas.");
}

function renderCompList() {
  let html = "";

  MAIN_COMPS.forEach(c => {
    const checked = comp.enabled.includes(c.id) ? "checked" : "";
    html += `
      <label class="comp-item">
        <input type="checkbox" ${checked} onchange="toggleComp(${c.id},this.checked)">
        ${c.nome}
      </label>`;
  });

  html += `
    <label class="comp-item" style="border-top:1px solid var(--border);padding-top:7px;margin-top:8px">
      <input type="checkbox" ${comp.showOthers ? "checked" : ""} onchange="toggleOthers(this.checked)">
      Mostrar outras competições
    </label>`;

  $("comp-list").innerHTML = html;
}

function toggleComp(id,on) {
  if (on) comp.enabled = Array.from(new Set(comp.enabled.concat([id])));
  else comp.enabled = comp.enabled.filter(x => x !== id);

  localStorage.setItem(LS_COMP, JSON.stringify(comp));
  renderLista();
}

function toggleOthers(on) {
  comp.showOthers = on;
  localStorage.setItem(LS_COMP, JSON.stringify(comp));
  renderLista();
}

function visibleFixture(f) {
  const lid = f.league.id;
  const main = MAIN_COMPS.some(c => c.id === lid);
  return main ? comp.enabled.includes(lid) : comp.showOthers;
}

function localDate() {
  return new Date().toLocaleDateString("sv-SE");
}

async function af(endpoint, params = {}) {
  if (!cfg.apiKey) {
    toast("Configure sua API Key.", "error");
    return null;
  }

  try {
    const url = new URL(AF_BASE + endpoint);

    Object.entries(params).forEach(([k,v]) => {
      if (v !== null && v !== undefined && v !== "") {
        url.searchParams.set(k, v);
      }
    });

    const r = await fetch(url, {
      headers: {
        "x-apisports-key": cfg.apiKey
      }
    });

    if (!r.ok) {
      throw new Error("HTTP " + r.status);
    }

    const d = await r.json();

    if (d.errors && Object.keys(d.errors).length) {
      console.error("API-Football errors:", d.errors);
      return null;
    }

    return d;

  } catch(e) {
    console.error(e);
    toast("Falha ao consultar API-Football.", "error");
    return null;
  }
}

async function buscarJogos() {
  if (!cfg.apiKey) {
    toast("Configure sua API Key.", "error");
    return;
  }

  setLoading("btn-search", true, "Buscando...");

  try {
    const [liveR, upcomingR] = await Promise.all([
      af("/fixtures", { live: "all" }),
      af("/fixtures", { date: localDate(), status: "NS" })
    ]);

    const live = liveR?.response || [];
    const now = Date.now();
    const limit = now + 12 * 3600 * 1000;

    const upcoming = (upcomingR?.response || []).filter(f => {
      const t = new Date(f.fixture.date).getTime();
      return t >= now && t <= limit;
    });

    S.fixtures = { live, upcoming };
    renderLista();
    $("last-update").textContent = "Atualizado " + new Date().toLocaleTimeString("pt-BR");

  } catch(e) {
    toast("Erro: " + e.message, "error");
  } finally {
    setLoading("btn-search", false, "🔍 Buscar jogos");
  }
}

function renderLista() {
  const live = (S.fixtures.live || []).filter(visibleFixture);
  const upcoming = (S.fixtures.upcoming || []).filter(visibleFixture);

  if (!live.length && !upcoming.length) {
    $("matches").innerHTML = '<p style="font-size:12px;color:var(--muted)">Nenhum jogo nas competições selecionadas.</p>';
    return;
  }

  let html = "";

  if (live.length) {
    html += `<div style="font-size:10px;color:var(--live);font-weight:900;margin:10px 0 6px">🔴 AO VIVO · ${live.length}</div>`;
    live.forEach(f => html += matchCard(f, true));
  }

  if (upcoming.length) {
    html += `<div style="font-size:10px;color:var(--upcoming);font-weight:900;margin:10px 0 6px">🕐 PRÓXIMAS 12H · ${upcoming.length}</div>`;
    upcoming.forEach(f => html += matchCard(f, false));
  }

  $("matches").innerHTML = html;
}

function matchCard(f,live) {
  const fid = f.fixture.id;
  const selected = S.selectedId === fid ? " selected" : "";
  const min = f.fixture.status.elapsed;
  const gh = f.goals.home ?? "—";
  const ga = f.goals.away ?? "—";
  const hr = new Date(f.fixture.date).toLocaleTimeString("pt-BR", {
    hour: "2-digit",
    minute: "2-digit"
  });

  return `
    <div class="match-card ${live ? "live" : "upcoming"}${selected}" onclick="selecionarJogo(${fid})">
      <div class="card-top">
        <span class="league">${f.league.name}</span>
        <span class="badge ${live ? "badge-live" : "badge-up"}">${live ? "● " + (min || "") + "'" : hr}</span>
      </div>
      <div class="card-body">
        <div class="team-mini">
          <img src="${f.teams.home.logo}" onerror="this.style.display='none'">
          <span>${f.teams.home.name}</span>
        </div>
        <div class="score-mini">${gh} : ${ga}</div>
        <div class="team-mini away">
          <img src="${f.teams.away.logo}" onerror="this.style.display='none'">
          <span>${f.teams.away.name}</span>
        </div>
      </div>
    </div>`;
}

async function selecionarJogo(fid) {
  S.selectedId = fid;
  S.preview = null;
  S.statsData = [];
  S.standData = null;
  S.playersData = [];
  S.sheetLoaded = false;
  S.activeTab = "geral";

  renderLista();

  $("main").innerHTML = `
    <div class="empty">
      <span class="spinner" style="width:34px;height:34px;border-width:3px;color:var(--purple3)"></span>
      <span>Carregando jogo...</span>
    </div>`;

  const data = await carregarDadosBasicos(fid);

  if (!data.fixture) {
    toast("Não foi possível carregar o jogo.", "error");
    return;
  }

  S.preview = {
    fixture: data.fixture,
    eventos: data.eventos,
    escalacao: data.escalacao
  };

  renderPreview();
  broadcastState();
}

async function carregarDadosBasicos(fid) {
  const [fxR, evR, lnR] = await Promise.all([
    af("/fixtures", { id: fid }),
    af("/fixtures/events", { fixture: fid }),
    af("/fixtures/lineups", { fixture: fid })
  ]);

  return {
    fixture: fxR?.response?.[0] || null,
    eventos: evR?.response || [],
    escalacao: lnR?.response || []
  };
}

async function garantirDadosCompletos() {
  if (!S.selectedId || !S.preview?.fixture) return;

  const f = S.preview.fixture;
  const fid = S.selectedId;

  const requests = [];

  requests.push(af("/fixtures", { id: fid }).then(d => {
    S.preview.fixture = d?.response?.[0] || S.preview.fixture;
  }));

  requests.push(af("/fixtures/events", { fixture: fid }).then(d => {
    S.preview.eventos = d?.response || [];
  }));

  requests.push(af("/fixtures/lineups", { fixture: fid }).then(d => {
    S.preview.escalacao = d?.response || [];
  }));

  requests.push(af("/fixtures/statistics", { fixture: fid }).then(d => {
    S.statsData = d?.response || [];
  }));

  requests.push(af("/fixtures/players", { fixture: fid }).then(d => {
    S.playersData = d?.response || [];
  }));

  if (f?.league?.id && f?.league?.season) {
    requests.push(af("/standings", {
      league: f.league.id,
      season: f.league.season
    }).then(d => {
      S.standData = d?.response?.[0] || null;
    }));
  }

  await Promise.all(requests);
}

async function enviarSheets() {
  if (!cfg.scriptUrl) {
    toast("Configure a URL do Apps Script.", "error");
    return false;
  }

  const payload = {
    fixture: S.preview?.fixture || null,
    eventos: S.preview?.eventos || [],
    escalacao: S.preview?.escalacao || [],
    lineups: S.preview?.escalacao || [],
    estatisticas: S.statsData || [],
    classificacao: S.standData || null,
    jogadores: S.playersData || [],
    players: S.playersData || []
  };

  await fetch(cfg.scriptUrl, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify(payload)
  });

  return true;
}

async function carregarPlanilha() {
  if (!S.preview) return;

  setLoading("btn-load-sheet", true, "Buscando tudo...");

  try {
    await garantirDadosCompletos();

    setLoading("btn-load-sheet", true, "Escrevendo planilha...");
    await enviarSheets();

    S.sheetLoaded = true;

    toast("Planilha enviada. Veja TIME_1 e TIME_2.");
    renderPreview();
    broadcastState();

    if (!$("auto-refresh").checked) {
      $("auto-refresh").checked = true;
      toggleAuto(true);
    }

  } catch(e) {
    console.error(e);
    toast("Erro ao carregar planilha.", "error");
  } finally {
    setLoading("btn-load-sheet", false, "📊 Carregar planilha");
  }
}

async function atualizarPlanilha() {
  if (!S.preview) return;

  setLoading("btn-update-sheet", true, "Atualizando...");

  try {
    await garantirDadosCompletos();
    await enviarSheets();
    toast("Planilha atualizada.");
    renderPreview();
    broadcastState();
  } catch(e) {
    console.error(e);
    toast("Erro ao atualizar.", "error");
  } finally {
    setLoading("btn-update-sheet", false, "🔄 Atualizar");
  }
}

function toggleAuto(on) {
  if (on) startAuto();
  else stopAuto();
}

function startAuto() {
  stopAuto();

  countdown = parseInt($("refresh-interval").value, 10) || 300;
  updateCountdown();

  timer = setInterval(async () => {
    countdown--;
    updateCountdown();

    if (countdown <= 0) {
      countdown = parseInt($("refresh-interval").value, 10) || 300;
      await autoRefresh();
    }
  }, 1000);
}

function stopAuto() {
  if (timer) clearInterval(timer);
  timer = null;
  $("countdown").textContent = "";
}

function updateCountdown() {
  const m = Math.floor(countdown / 60);
  const s = countdown % 60;
  $("countdown").textContent = m ? `${m}m${String(s).padStart(2,"0")}` : `${s}s`;
}

async function autoRefresh() {
  if (!S.selectedId || !S.preview) return;

  try {
    await garantirDadosCompletos();

    if ($("auto-sync").checked && cfg.scriptUrl) {
      await enviarSheets();
      S.sheetLoaded = true;
    }

    renderPreview();
    renderLista();
    broadcastState();

    $("last-update").textContent = "Auto " + new Date().toLocaleTimeString("pt-BR");
  } catch(e) {
    console.error(e);
  }
}

function broadcastState() {
  if (!bc) return;

  bc.postMessage({
    type: "state_update",
    fixture: S.preview?.fixture || null,
    eventos: S.preview?.eventos || [],
    escalacao: S.preview?.escalacao || [],
    statsData: S.statsData || [],
    standData: S.standData || null,
    playersData: S.playersData || []
  });
}

function renderPreview() {
  const f = S.preview?.fixture;
  if (!f) return;

  const eventos = S.preview.eventos || [];
  const escalacao = S.preview.escalacao || [];
  const gh = f.goals.home ?? 0;
  const ga = f.goals.away ?? 0;
  const min = f.fixture.status.elapsed;
  const live = ["1H","2H","HT","ET","P","BT","LIVE"].includes(f.fixture.status.short);
  const ended = ["FT","AET","PEN"].includes(f.fixture.status.short);

  $("main").innerHTML = `
    <div class="scoreboard">
      <div class="sb-top">
        <img src="${f.league.logo}" onerror="this.style.display='none'">
        <span class="sb-league">${f.league.name} · ${f.league.country}</span>
        <div class="sb-status">${f.fixture.status.long}${min ? " · " + min + "'" : ""}</div>
      </div>

      <div class="sb-body">
        <div class="sb-team">
          <img src="${f.teams.home.logo}" onerror="this.style.display='none'">
          <div>${f.teams.home.name}</div>
        </div>

        <div class="sb-score">${gh} : ${ga}</div>

        <div class="sb-team">
          <img src="${f.teams.away.logo}" onerror="this.style.display='none'">
          <div>${f.teams.away.name}</div>
        </div>
      </div>

      <div class="sb-actions">
        <button class="btn btn-green" id="btn-load-sheet" onclick="carregarPlanilha()">📊 Carregar planilha</button>
        <button class="btn btn-blue" id="btn-update-sheet" onclick="atualizarPlanilha()" ${S.sheetLoaded ? "" : "disabled"}>🔄 Atualizar</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="geral" onclick="switchTab('geral')">📋 Geral</button>
      <button class="tab" data-tab="stats" onclick="switchTab('stats')">📊 Estatísticas</button>
      <button class="tab" data-tab="stand" onclick="switchTab('stand')">🏆 Classificação</button>
      <button class="tab" data-tab="players" onclick="switchTab('players')">👥 Jogadores</button>
    </div>

    <div id="tab-geral">
      <div class="grid">
        <div class="panel">
          <h3>Eventos</h3>
          ${eventosHTML(eventos, f.teams.home.name)}
        </div>
        <div class="panel">
          <h3>Escalação</h3>
          ${lineupHTML(escalacao)}
        </div>
      </div>
    </div>

    <div id="tab-stats" style="display:none">
      <div class="panel">
        <h3>Estatísticas</h3>
        ${
          live || ended
          ? statsHTML()
          : '<p style="font-size:12px;color:var(--muted)">Disponível após o início da partida.</p>'
        }
      </div>
    </div>

    <div id="tab-stand" style="display:none">
      <div class="panel">
        <h3>Classificação</h3>
        ${standingsHTML()}
      </div>
    </div>

    <div id="tab-players" style="display:none">
      ${playersStatsHTML()}
    </div>`;
}

function switchTab(tab) {
  S.activeTab = tab;

  document.querySelectorAll(".tab").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === tab);
  });

  ["geral","stats","stand","players"].forEach(t => {
    const el = $("tab-" + t);
    if (el) el.style.display = t === tab ? "block" : "none";
  });
}

function eventosHTML(eventos, homeName) {
  if (!eventos.length) {
    return '<p style="font-size:12px;color:var(--muted)">Nenhum evento registrado.</p>';
  }

  return eventos.map(ev => {
    const ico = ev.detail === "Red Card" ? "🟥" : (ICONES[ev.type] || "•");
    const sub = ev.assist?.name && ev.type === "subst" ? " ↩ " + ev.assist.name : "";
    const lado = ev.team.name === homeName ? "TIME_1" : "TIME_2";

    return `
      <div class="event">
        <span class="event-min">${ev.time.elapsed || ""}'</span>
        <span>${ico}</span>
        <span class="event-name">${ev.player?.name || ""}${sub}</span>
        <span class="event-team">${lado}</span>
      </div>`;
  }).join("");
}

function playerStatsById(pid) {
  for (const team of S.playersData || []) {
    for (const p of team.players || []) {
      if (p.player && p.player.id === pid) {
        return p;
      }
    }
  }

  return null;
}

function playerStatsMini(pid) {
  const p = playerStatsById(pid);
  const s = p?.statistics?.[0] || {};

  const min = s.games?.minutes ?? "";
  const nota = s.games?.rating ? Number(s.games.rating).toFixed(1) : "";
  const gols = s.goals?.total ?? 0;
  const ass = s.goals?.assists ?? 0;
  const ama = s.cards?.yellow ?? 0;
  const ver = s.cards?.red ?? 0;

  let bits = [];

  if (min !== "") bits.push(`${min}min`);
  if (nota !== "") bits.push(`⭐ ${nota}`);
  if (gols) bits.push(`⚽ ${gols}`);
  if (ass) bits.push(`🅰 ${ass}`);
  if (ama) bits.push(`🟨 ${ama}`);
  if (ver) bits.push(`🟥 ${ver}`);

  return bits.join(" · ");
}

function playersStatsHTML() {
  if (!S.playersData || !S.playersData.length) {
    return `
      <div class="panel">
        <h3>Jogadores</h3>
        <p style="font-size:12px;color:var(--muted)">
          Clique em “Carregar planilha” para buscar as estatísticas dos jogadores.
        </p>
      </div>`;
  }

  return (S.playersData || []).map(team => {
    const rows = (team.players || []).map(p => {
      const s = p.statistics?.[0] || {};

      return `
        <tr>
          <td>${s.games?.number ?? ""}</td>
          <td>${p.player?.name ?? ""}</td>
          <td>${s.games?.position ?? ""}</td>
          <td>${s.games?.minutes ?? ""}</td>
          <td>${s.games?.rating ? Number(s.games.rating).toFixed(1) : ""}</td>
          <td>${s.goals?.total ?? 0}</td>
          <td>${s.goals?.assists ?? 0}</td>
          <td>${s.shots?.total ?? 0}</td>
          <td>${s.shots?.on ?? 0}</td>
          <td>${s.passes?.total ?? 0}</td>
          <td>${s.passes?.accuracy ?? ""}</td>
          <td>${s.tackles?.total ?? 0}</td>
          <td>${s.cards?.yellow ?? 0}</td>
          <td>${s.cards?.red ?? 0}</td>
        </tr>`;
    }).join("");

    return `
      <div class="panel" style="margin-bottom:14px">
        <h3>
          <img src="${team.team?.logo || ""}" style="width:18px;height:18px;vertical-align:middle;margin-right:6px" onerror="this.style.display='none'">
          ${team.team?.name || "Time"}
        </h3>

        <div style="overflow-x:auto">
          <table class="table">
            <thead>
              <tr>
                <th>#</th>
                <th>Jogador</th>
                <th>Pos</th>
                <th>Min</th>
                <th>Nota</th>
                <th>G</th>
                <th>A</th>
                <th>Ch</th>
                <th>No gol</th>
                <th>Passes</th>
                <th>%</th>
                <th>Des</th>
                <th>🟨</th>
                <th>🟥</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join("");
}

function lineupHTML(escalacao) {
  if (!escalacao.length) {
    return '<p style="font-size:12px;color:var(--muted)">Escalação ainda não disponível.</p>';
  }

  return escalacao.map(team => {
    const titulares = (team.startXI || []).map(p => playerHTML(p.player, false)).join("");
    const reservas = (team.substitutes || []).map(p => playerHTML(p.player, true)).join("");

    return `
      <div class="lineup-team">
        <div class="lineup-head">
          <img src="${team.team.logo}" onerror="this.style.display='none'">
          <span>${team.team.name}</span>
          <span style="color:var(--purple3)">${team.formation || ""}</span>
        </div>
        <div class="players">${titulares}</div>
        <div class="sub-label">Reservas</div>
        <div class="players">${reservas}</div>
      </div>`;
  }).join("");
}

function playerHTML(pl, sub) {
  const foto = "https://media.api-sports.io/football/players/" + pl.id + ".png";
  const mini = playerStatsMini(pl.id);

  return `
    <div class="player" style="${sub ? "opacity:.55" : ""}">
      <img src="${foto}" onerror="this.src='https://placehold.co/40x40/1C0D2E/9B59D0?text=${pl.number || ""}'">
      <div class="player-num">#${pl.number || ""}</div>
      <div class="player-name">${(pl.name || "").split(" ").pop()}</div>
      <div class="player-pos">${pl.pos || ""}</div>
      <div class="player-mini">${mini}</div>
    </div>`;
}

function statsHTML() {
  const data = S.statsData;

  if (!data || data.length < 2) {
    return '<p style="font-size:12px;color:var(--muted)">Clique em “Carregar planilha” para buscar as estatísticas.</p>';
  }

  const hS = data[0].statistics || [];
  const aS = data[1].statistics || [];

  const get = (arr,t) => (arr.find(s => s.type === t) || {}).value ?? "";

  const stats = [
    ["Ball Possession","Posse de bola",true],
    ["Shots on Goal","Chutes no gol"],
    ["Shots off Goal","Chutes para fora"],
    ["Total Shots","Total de chutes"],
    ["Blocked Shots","Chutes bloqueados"],
    ["Corner Kicks","Escanteios"],
    ["Fouls","Faltas"],
    ["Yellow Cards","Amarelos"],
    ["Red Cards","Vermelhos"],
    ["Offsides","Impedimentos"],
    ["Goalkeeper Saves","Defesas"],
    ["Total passes","Passes"],
    ["Passes accurate","Passes certos"]
  ];

  return stats.map(([type,label,isPct]) => statRow(label, get(hS,type), get(aS,type), isPct)).join("");
}

function statRow(label,hv,av,isPct) {
  const hn = num(hv);
  const an = num(av);

  let ph, pa;

  if (isPct) {
    ph = hn;
    pa = 100 - hn;
  } else {
    const t = hn + an;
    ph = t ? Math.round(hn / t * 100) : 50;
    pa = 100 - ph;
  }

  return `
    <div class="stat-row">
      <div class="stat-label">${label}</div>
      <div class="stat-wrap">
        <span class="stat-val right">${hv || 0}</span>
        <div class="track">
          <div class="bar-home" style="width:${ph}%"></div>
          <div class="bar-away" style="width:${pa}%"></div>
        </div>
        <span class="stat-val">${av || 0}</span>
      </div>
    </div>`;
}

function standingsHTML() {
  const data = S.standData;
  const f = S.preview?.fixture;

  if (!data) {
    return '<p style="font-size:12px;color:var(--muted)">Clique em “Carregar planilha” para buscar a classificação.</p>';
  }

  const tables = data.league?.standings || data.standings || [];

  if (!tables.length) {
    return '<p style="font-size:12px;color:var(--muted)">Classificação não disponível para esta competição/fase.</p>';
  }

  const hid = f?.teams?.home?.id;
  const aid = f?.teams?.away?.id;

  return tables.map((table, idx) => {
    const title = table?.[0]?.group || table?.[0]?.description || "Grupo " + (idx + 1);

    const rows = table.map(s => {
      const hl = s.team.id === hid || s.team.id === aid ? "highlight" : "";

      return `
        <tr class="${hl}">
          <td>${s.rank}</td>
          <td>${s.team.name}</td>
          <td>${s.points}</td>
          <td>${s.all.played}</td>
          <td>${s.all.win}</td>
          <td>${s.all.draw}</td>
          <td>${s.all.lose}</td>
          <td>${s.goalsDiff > 0 ? "+" : ""}${s.goalsDiff}</td>
        </tr>`;
    }).join("");

    return `
      <div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:900;color:var(--purple3);margin-bottom:6px;text-transform:uppercase">${title}</div>
        <table class="table">
          <thead>
            <tr>
              <th>#</th><th>Time</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join("");
}

function num(v) {
  return Number(String(v ?? "0").replace("%","")) || 0;
}
</script>
</body>
</html>
